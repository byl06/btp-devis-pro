<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTP Devis Pro - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-hard-hat"></i>
            <span>BTP Devis Pro</span>
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-item active" data-page="dashboard">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-page="devis">
                <i class="fas fa-file-invoice"></i>
                <span>Devis</span>
            </a>
            <a href="#" class="nav-item" data-page="clients">
                <i class="fas fa-users"></i>
                <span>Clients</span>
            </a>
            <a href="#" class="nav-item" data-page="projets">
                <i class="fas fa-building"></i>
                <span>Projets</span>
            </a>
            <a href="#" class="nav-item" data-page="factures">
                <i class="fas fa-receipt"></i>
                <span>Factures</span>
            </a>
            <a href="#" class="nav-item" data-page="parametres">
                <i class="fas fa-cog"></i>
                <span>Paramètres</span>
            </a>
        </nav>
        <div class="user-info">
            <div>
                <p class="user-name" id="user-name">Chargement...</p>
                <p class="user-email" id="user-email"></p>
            </div>
            <button class="logout-btn" onclick="app.logout()">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
        <header class="glass-header">
            <h1 id="page-title">Dashboard</h1>
            <div class="header-right">
                
        </header>
        <div class="content-area" id="content-area">
            <div class="loading">Chargement...</div>
        </div>
    </main>
</div>
    
    <script src="js/app.js"></script>
    
</body>
</html>
